---
# Environment overrides
tags:
  environment: {{ .Environment }}
  tenant: {{ default "none" .Tenant }}

---
# Environment-specific queues
sqs_queues:
  # Inherits global template 'sqs_base'
  notifications:
    _inherit: sqs_base
  
  # Inherits global template 'critical'
  payments:
    _inherit: critical
    visibility_timeout: 120  # override value

---
# Environment-specific buckets
s3_buckets:
  # Inherits global template 's3_base'
  data:
    _inherit: s3_base
    bucket_name: {{ .Tenant | lower }}-prod-data-bucket
