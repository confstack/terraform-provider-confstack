tags:
  managed_by: opentofu
  team: platform

sqs_queues:
  _templates:
    base:
      retention: 86400
      dlq: true
      visibility_timeout: 30

dynamodb_tables:
  _templates:
    base:
      billing_mode: PAY_PER_REQUEST

s3_buckets:
  _templates:
    base:
      versioning: true
      encryption: AES256
